name: Daily Horizon Summary

on:
  # schedule:
  #   - cron: '0 0 */2 * *'  # Runs every 2 days at 00:00 UTC
  #     timezone: 'Asia/Shanghai'
  workflow_dispatch:      # Allow manual trigger

jobs:
  daily-summary:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Needed to commit changes

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install dependencies
        run: uv sync

      - name: Prepare GitHub Actions config
        run: |
          if [ -f data/config.github.json ]; then
            cp data/config.github.json data/config.json
          elif [ -f data/config.example.json ]; then
            cp data/config.example.json data/config.json
          fi

      - name: Inject Gemini & Arabic Config Dynamically
        run: |
          python -c '
          import json
          with open("data/config.json", "r") as f:
              data = json.load(f)
          
          # إجبار النظام على تشغيل جيميناي فلاش 1.5 بالإعدادات الصحيحة
          data["ai"] = {
              "provider": "gemini",
              "model": "gemini-1.5-flash",
              "api_key_env": "GOOGLE_API_KEY",
              "temperature": 0.3,
              "max_tokens": 4096,
              "throttle_sec": 0,
              "analysis_concurrency": 1,
              "enrichment_concurrency": 1
          }
          
          # توجيه الـ Webhook والملخصات لتدعم الصياغة العربية الفصحى
          if "webhook" in data:
              data["webhook"]["request_body"]["card"]["header"]["title"]["content"] = "ملخص الأخبار اليومي من هورايزون"
              data["webhook"]["request_body"]["card"]["body"]["elements"][0]["content"] = "نتائج هورايزون: #{result}\nعدد الأخبار الهامة: #{important_items}/#{all_items}\n\nتنبيه: يجب صياغة الملخصات التالية باللغة العربية الفصحى فقط."
          
          with open("data/config.json", "w") as f:
              json.dump(data, f, indent=2, ensure_ascii=False)
          '

      - name: Run Horizon
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          LWN_KEY: ${{ secrets.LWN_KEY }}
        run: uv run horizon --hours 48

      - name: Set current date as environment variable
        run: echo "DATE=$(date +'%Y-%m-%d')" >> $GITHUB_ENV

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          keep_files: true  # Keep existing summaries on gh-pages branch
          commit_message: "📝 Daily Summary: ${{ env.DATE }}"
          publish_branch: gh-pages
          enable_jekyll: true
