name: Daily Horizon Summary

on:
  # schedule:
  #   - cron: '0 0 */2 * *'  # Runs every 2 days at 00:00 UTC
  #     timezone: 'Asia/Shanghai'
  workflow_dispatch:      # Allow manual trigger

jobs:
  daily-summary:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Needed to commit changes

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install dependencies
        run: uv sync

      - name: Prepare GitHub Actions config
        run: |
          if [ -f data/config.github.json ]; then
            cp data/config.github.json data/config.json
          elif [ -f data/config.example.json ]; then
            cp data/config.example.json data/config.json
          fi

      - name: Inject Gemini & Arabic Translation Prompts
        run: |
          import json
          import os

          # 1. تصحيح ملف الإعدادات وإجبار النظام على لغة المخرجات العربية
          config_path = "data/config.json"
          if os.path.exists(config_path):
              with open(config_path, "r") as f:
                  data = json.load(f)
              
              data["ai"] = {
                  "provider": "gemini",
                  "model": "gemini-1.5-flash",
                  "api_key_env": "GOOGLE_API_KEY",
                  "temperature": 0.3,
                  "max_tokens": 4096,
                  "throttle_sec": 0,
                  "analysis_concurrency": 1,
                  "enrichment_concurrency": 1
              }
              
              if "language" not in data:
                  data["language"] = {}
              data["language"]["output_language"] = "ar"
              
              if "webhook" in data:
                  data["webhook"]["request_body"]["card"]["header"]["title"]["content"] = "ملخص الأخبار اليومي من هورايزون"
                  data["webhook"]["request_body"]["card"]["body"]["elements"][0]["content"] = "نتائج هورايزون: #{result}\nعدد الأخبار الهامة: #{important_items}/#{all_items}"

              with open(config_path, "w") as f:
                  json.dump(data, f, indent=2, ensure_ascii=False)

          # 2. حقن أمر الترجمة الفورية للعربية في جميع قوالب البرومبت المتوفرة
          prompt_dirs = ["src/prompts", "src/ai/prompts", "src/templates"]
          arabic_instruction = "\n\n[CRITICAL INSTRUCTION: You must generate the entire response, including all news summaries, titles, core insights, categories, and analytical descriptions, in clear, professional, and structured Arabic (العربية الفصحى) only. Do not use English or Chinese for the final output text under any circumstances.]\n"
          
          for p_dir in prompt_dirs:
              if os.path.exists(p_dir):
                  for root, dirs, files in os.walk(p_dir):
                      for file in files:
                          if file.endswith((".md", ".txt", ".json")):
                              file_path = os.path.join(root, file)
                              try:
                                  with open(file_path, "r", encoding="utf-8") as f:
                                      content = f.read()
                                  if "structured Arabic" not in content:
                                      with open(file_path, "a", encoding="utf-8") as f:
                                          f.write(arabic_instruction)
                              except Exception:
                                  pass
          print("Arabic prompts injected successfully.")
        shell: python

      - name: Run Horizon
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          LWN_KEY: ${{ secrets.LWN_KEY }}
        run: uv run horizon --hours 48

      - name: Set current date as environment variable
        run: echo "DATE=$(date +'%Y-%m-%d')" >> $GITHUB_ENV

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          keep_files: true  # Keep existing summaries on gh-pages branch
          commit_message: "📝 Daily Summary (Arabic): ${{ env.DATE }}"
          publish_branch: gh-pages
          enable_jekyll: true
